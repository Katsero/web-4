<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuzzleStore</title>
    <link rel="stylesheet" href="../../static/puzzlestore/normalize.css">
    <link rel="stylesheet" href="../../static/puzzlestore/styles.css">
</head>
<body>
<header class="header">
    <div class="header__grid">
        <div class="header__logo">
            <img src="#" alt="CubeIcon">
            <span class="text--logo">PUZZLESTORE</span>
        </div>
        <div class="header__search">
            <input type="text" placeholder="Поиск">
            <!-- <button type="button"></button> -->
        </div>
        <a href="#" class="header__link header__auth">Вход/регистрация</a>
        
        <a href="#" class="header__link">Каталог</a>
        <a href="#" class="header__link header__link--cta">Новинки</a>
        <a href="#" class="header__link">Блог</a>
        <a href="#" class="header__link">Поддержка</a>
        <a href="#" class="header__link">О нас</a>
        <a href="#" class="header__link">Корзина</a>
    </div>
</header>
    <div class="breadcrumbs"></div>
    <h1 class="hidden">PuzzleStore</h1>
    <main>
        <section class="blog">
            <h2 class="blog__title h2">БЛОГ</h2>
            <div class="blog__wrapper"></div>
        </section>
        
        <section class="popular">
            <h2 class="popular__title h2">ПОПУЛЯРНЫЕ ИГРЫ</h2>
            <div class="popular__wrapper"></div>
        </section>

        <section class="about">
            <h2 class="about__title h2">О нас</h2>
            <div class="about__wrapper"></div>
        </section>

        <section class="reviews">
            <h2 class="reviews__title h2">Отзывы</h2>
            <div class="reviews__wrapper"></div>
        </section>

        <section class="delivery">
            <h2 class="delivery__title h2">Доставка и оплата</h2>
            <div class="delivery__wrapper"></div>
        </section>

        <section class="sales">
            <h2 class="sales__title h2">Акции</h2>
            <div class="sales__"></div>wrapper
        </section>
    </main>
    <footer>
        
    </footer>
</body>
</html>
