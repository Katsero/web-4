<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление игры</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .delete-card {
            max-width: 600px;
            margin: 4rem auto;
        }
        .warning-icon {
            font-size: 4rem;
            color: #f44336;
        }
        .game-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0367A6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow delete-card">
            <div class="card-body text-center p-5">
                <div class="warning-icon mb-3">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                
                <h1 class="h3 mb-3">Удаление игры</h1>
                
                <p class="lead">
                    Вы уверены, что хотите удалить игру
                </p>
                <p class="game-name mb-4">
                    <i class="bi bi-box-seam"></i> "{{ game.name }}"?
                </p>
                
                <div class="alert alert-warning" role="alert">
                    <i class="bi bi-info-circle"></i> Это действие нельзя отменить.
                </div>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="bi bi-trash"></i> Да, удалить
                        </button>
                        <a href="{% url 'puzzlestore:games_crud' %}" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-x-circle"></i> Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
