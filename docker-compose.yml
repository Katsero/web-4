services:
  db:
    image: postgres:15-alpine
    container_name: puzzlestore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: puzzlestore_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d puzzlestore_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: